events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    server_tokens off;
    charset utf-8;
    client_max_body_size 50M;

    # ================= HTTP (80) =================
    server {
        listen 80;
        server_name paper-snitch.online www.paper-snitch.online paper-snitch.ing.unimore.it www.paper-snitch.ing.unimore.it;

        # ACME challenge (Let’s Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ================= HTTPS (443) =================
    server {
        listen 443 ssl;
        http2 on;
        server_name paper-snitch.online www.paper-snitch.online paper-snitch.ing.unimore.it www.paper-snitch.ing.unimore.it;

        # Updated to point to the new domain's certificate folder!
        ssl_certificate     /etc/letsencrypt/live/paper-snitch.ing.unimore.it/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/paper-snitch.ing.unimore.it/privkey.pem;

        # Static files
        location /static/ {
            alias /static/;
            expires 7d;
            access_log off;
        }

        # media files
        location /media/ {
            alias /media/; 
            access_log off;
        }

        # Django app
        location / {
            proxy_pass http://django-web-prod:8000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}